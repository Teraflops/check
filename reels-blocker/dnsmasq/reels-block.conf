# dnsmasq config to sinkhole short-form-video-only domains at the DNS level.
#
# Drop this file into /etc/dnsmasq.d/ (or merge into dnsmasq.conf) and restart
# dnsmasq, then point your LAN's DNS at this host. This is the coarse layer:
# it kills whole services that are exclusively short-form video. Apps where
# reels share a domain with other features (Instagram, Facebook, YouTube) are
# handled by the mitmproxy addon instead — DNS can't separate them.
#
# 0.0.0.0 / :: => the name resolves to nowhere, so the app can't reach it.

# --- TikTok (entire product is short-form video) ---
address=/tiktok.com/0.0.0.0
address=/tiktokv.com/0.0.0.0
address=/tiktokcdn.com/0.0.0.0
address=/tiktokcdn-us.com/0.0.0.0
address=/byteoversea.com/0.0.0.0
address=/ibytedtos.com/0.0.0.0
address=/muscdn.com/0.0.0.0

# IPv6 sinkholes for the same set.
address=/tiktok.com/::
address=/tiktokv.com/::
address=/tiktokcdn.com/::
address=/tiktokcdn-us.com/::
